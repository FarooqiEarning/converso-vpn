version: '3.9'

services:
  # ─────────────────────────────────────────────
  # Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: converso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-converso_vpn}
      POSTGRES_USER: ${DATABASE_USERNAME:-converso_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-converso_user} -d ${DATABASE_NAME:-converso_vpn}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - converso-network

  # ─────────────────────────────────────────────
  # Cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: converso-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - converso-network

  # ─────────────────────────────────────────────
  # Control Plane API
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: converso-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    networks:
      - converso-network

  # ─────────────────────────────────────────────
  # Frontend Web
  # ─────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: converso-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    ports:
      - "3001:3001"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - converso-network

  # ─────────────────────────────────────────────
  # Nginx Gateway
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: converso-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - converso-network

  # ─────────────────────────────────────────────
  # Monitoring - Prometheus
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: converso-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - converso-network

  # ─────────────────────────────────────────────
  # Monitoring - Grafana
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: converso-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3002
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - converso-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  converso-network:
    driver: bridge