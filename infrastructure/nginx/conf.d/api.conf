# =============================================================================
# File: api.conf
# Purpose: API backend reverse proxy - LOCAL DEV VERSION (no SSL)
# For Production SSL: Replace with infrastructure/nginx/conf.d/production/api.conf
# =============================================================================

upstream api_backend {
    server api:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost api.local api.vpn.conversoempire.world;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "API OK\n";
        add_header Content-Type text/plain;
    }

    # ACME challenge for SSL certificates (when enabled)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Default: proxy to API
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket support
    location /v1/ws {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Swagger documentation
    location /v1/api/docs {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}