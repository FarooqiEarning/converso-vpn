# =============================================================================
# File: web.conf
# Purpose: Web application reverse proxy - LOCAL DEV VERSION (no SSL)
# For Production SSL: Replace with infrastructure/nginx/conf.d/production/web.conf
# =============================================================================

upstream web_backend {
    server web:3001;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost web.local app.vpn.conversoempire.world admin.vpn.conversoempire.world vpn.conversoempire.world;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "Web OK\n";
        add_header Content-Type text/plain;
    }

    # ACME challenge for SSL certificates (when enabled)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Default: proxy to Web
    location / {
        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js static assets - long cache
    location /_next/static {
        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Images optimization
    location /_next/image {
        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000";
    }

    # API proxy (if web handles any API)
    location /api {
        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket for hot reload (dev only)
    location /_next/webpack-hmr {
        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
    }
}